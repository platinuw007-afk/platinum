<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoasgn.Naw_💸 | Premium Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(255, 255, 255, 0.8);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: #000;
        }

        /* Nền phong cảnh của bạn */
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.ibb.co/3mkMpM78/landscape.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* Hiệu ứng tuyết rơi */
        #snow-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease-out;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 20px var(--glow-color);
            object-fit: cover;
            transition: transform 0.5s;
        }

        .avatar:hover {
            transform: rotate(10deg) scale(1.05);
        }

        h1 {
            color: var(--text-color);
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--glow-color);
            margin: 10px 0;
        }

        .links-wrapper {
            margin-top: 30px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 12px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            font-weight: 500;
            gap: 10px;
        }

        .link-item:hover {
            background: white;
            color: black;
            box-shadow: 0 0 25px white;
            transform: translateY(-3px);
        }

        /* Hiệu ứng sóng khi click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body onclick="createRipple(event)">

    <div class="background"></div>
    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img src="https://i.ibb.co/m5g3nMbJ/avatar.jpg" alt="Hoasgn.Naw" class="avatar">
            </div>
            
            <h1>Hoasgn.Naw_💸</h1>

            <div class="links-wrapper">
                <a href="https://www.facebook.com/share/1CgFkW5sZq/" class="link-item">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
                <a href="https://m.me/j/AbaN07D8wQV4sLNQ/" class="link-item">
                    <i class="fab fa-facebook-messenger"></i> Box Messenger
                </a>
                <a href="https://zalo.me/g/1wul5eozuk2bmdsgk5a0" class="link-item">
                    <i class="fas fa-comment-dots"></i> Group Zalo
                </a>
                <a href="https://discord.gg/4gsmDeAe4" class="link-item">
                    <i class="fab fa-discord"></i> Discord
                </a>
            </div>
        </div>
    </div>

    <script>
        // Xử lý tuyết rơi
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 + 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Hiệu ứng Ripple khi ấn vào màn hình
        function createRipple(event) {
            const circle = document.createElement("div");
            const d = Math.max(window.innerWidth, window.innerHeight) * 0.1;
            circle.style.width = circle.style.height = d + "px";
            circle.style.left = event.clientX - d/2 + "px";
            circle.style.top = event.clientY - d/2 + "px";
            circle.classList.add("ripple");
            document.body.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        }
    </script>
</body>
</html>
