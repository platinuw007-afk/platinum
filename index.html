<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoasgn.Naw_💸 Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-glow: #ff79c6;
            --bg-dark: #0f0f0f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: url('https://w0.peakpx.com/wallpaper/593/16/HD-wallpaper-night-ocean-aesthetic.jpg'); /* Nền biển đêm giống image.png */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-glow);
            box-shadow: 0 0 20px var(--primary-glow);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            color: white;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            transition: 0.3s;
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .social-icons a:hover {
            transform: scale(1.2);
            color: var(--primary-glow);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid rgba(255, 121, 198, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-card:hover {
            background: var(--primary-glow);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        .stats-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .like-btn {
            background: none;
            border: none;
            color: #ff4757;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .like-btn:active {
            transform: scale(1.5);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Avatar từ ảnh của bạn -->
    <img src="https://i.ibb.co/3ykXv3V/avatar.jpg" alt="Avatar" class="avatar">
    
    <h1>Hoasgn.Naw_💸</h1>

    <div class="social-icons">
        <a href="https://www.facebook.com/share/1CgFkW5sZq/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://discord.gg/4gsmDeAe4" target="_blank"><i class="fab fa-discord"></i></a>
        <a href="https://zalo.me/0373960765" target="_blank"><i class="fas fa-comment"></i></a>
    </div>

    <div class="links-container">
        <a href="https://m.me/j/AbaN07D8wQV4sLNQ/?send_source=gc:copy_invite_link_c" class="link-card" target="_blank">
            <i class="fab fa-facebook-messenger"></i> Box Messenger
        </a>
        <a href="https://zalo.me/g/1wul5eozuk2bmdsgk5a0" class="link-card" target="_blank">
            <i class="fas fa-users"></i> Box Zalo
        </a>
    </div>

    <div class="stats-container">
        <div class="stat-item">
            <button class="like-btn" onclick="addLike()"><i class="fas fa-heart"></i></button>
            <span id="like-count">1,234</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-eye" style="color: #00d2ff; font-size: 1.2rem; margin-bottom: 10px;"></i>
            <span id="view-count">5,678</span>
        </div>
    </div>
</div>

<script>
    // Tính năng đếm lượt like đơn giản (lưu trong trình duyệt người dùng)
    let likes = parseInt(localStorage.getItem('likes')) || 1234;
    let views = parseInt(localStorage.getItem('views')) || 5678;

    document.getElementById('like-count').innerText = likes.toLocaleString();
    
    // Tăng lượt xem mỗi khi load trang
    views++;
    document.getElementById('view-count').innerText = views.toLocaleString();
    localStorage.setItem('views', views);

    function addLike() {
        likes++;
        document.getElementById('like-count').innerText = likes.toLocaleString();
        localStorage.setItem('likes', likes);
    }
</script>

</body>
</html>
